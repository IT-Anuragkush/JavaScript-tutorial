<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AJAX Product Grid</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      #searchBox {
        display: block;
        width: 400px;
        max-width: 90%;
        margin: 20px auto;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      body {
        background: #f1f3f6;
        padding: 20px;
      }

      button {
        display: block;
        margin: 20px auto;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        background: #2874f0;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1c5fd4;
      }

      #myData {
        max-width: 1400px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .product {
        background: white;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #ddd;
        transition: 0.3s;
      }

      .product:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }

      .product img {
        width: 100%;
        height: 250px;
        object-fit: contain;
        padding: 10px;
        background: white;
      }

      .product-details {
        padding: 15px;
      }

      .title {
        font-size: 15px;
        color: #333;
        margin-bottom: 10px;
        height: 40px;
        overflow: hidden;
      }

      .price {
        font-size: 24px;
        font-weight: bold;
        color: #111;
        margin-bottom: 10px;
      }

      .rating {
        display: inline-block;
        background: #388e3c;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .info {
        color: #666;
        font-size: 14px;
        margin: 4px 0;
      }

      @media (max-width: 768px) {
        #myData {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }

        .product img {
          height: 180px;
        }

        .price {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <input
      type="text"
      id="searchBox"
      placeholder="Search Product..."
      onkeyup="searchProduct()"
    />

    <button onclick="loadData()">Load Products</button>

    <div id="myData"></div>

    <script>
      let allProducts = [];

      function loadData() {
        const xhr = new XMLHttpRequest();

        xhr.open("GET", "https://dummyjson.com/products?limit=194", true);

        xhr.onload = function () {
          if (xhr.status === 200) {
            const result = JSON.parse(xhr.responseText);

            allProducts = result.products;

            displayProducts(allProducts);
          } else {
            document.getElementById("myData").innerHTML =
              "<h2>Failed to Load Data</h2>";
          }
        };

        xhr.send();
      }

      function displayProducts(products) {
        let data = "";

        products.forEach((product) => {
          data += `
        <div class="product">

            <img src="${product.thumbnail}" alt="${product.title}">

            <div class="product-details">

                <div class="title">
                    ${product.title}
                </div>

                <div class="price">
                    ₹${product.price}
                </div>

                <div class="rating">
                    ⭐ ${product.rating}
                </div>

                <div class="info">
                    Brand : ${product.brand}
                </div>

                <div class="info">
                    Stock : ${product.stock}
                </div>

            </div>

        </div>
        `;
        });

        document.getElementById("myData").innerHTML = data;
      }

      function searchProduct() {
        const searchText = document
          .getElementById("searchBox")
          .value.toLowerCase();

        const filteredProducts = allProducts.filter((product) =>
          product.title.toLowerCase().includes(searchText),
        );

        displayProducts(filteredProducts);
      }
    </script>
  </body>
</html>
