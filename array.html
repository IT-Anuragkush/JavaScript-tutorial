<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>array</title>
</head>
<body>
  
  <script>
    // create array
    let uInfo = [101, "Anurag", "male", "+91-6453468355"];

    console.log(uInfo);

    // push() method - it add element at last of the array
    uInfo.push(4861115);
    uInfo.push("indore", "Bholaram");
    console.log(uInfo);

    // pop() method  - it remove element from the end of the array
    uInfo.pop();
    console.log(uInfo);
    // for(let i = uInfo.length; i > 0; i++)
    // {
    //   uInfo.pop();  // it remove all element of the array
    // }
    // console.log(uInfo);

    // shift() - it remove element at the begening of the array
    uInfo.shift();
    console.log(uInfo);
    
    // unshift() method - it add element from the frist the array
    uInfo.unshift("hello");
    console.log(uInfo);

  </script>
</body>
</html>
