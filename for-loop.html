<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>for loop</title>
</head>
<body>
  <select id="currDay"></select>
  <select id="currMonth"></select>
  <select id="currYear"></select>
  

  <script>
    // day
    let option = `<option value="DD">DD</option>`;

    for(let i = 1; i <= 31; i++)
    {
      option += `<option value="${i}">${i}</option>`;
    }

    document.getElementById("currDay").innerHTML = option;

    // month
    let option1 = `<option value="MM">MM</option>`;

    for(let i = 1; i <= 12; i++)
    {
      option1 += `<option value="${i}">${i}</option>`;
    }

    document.getElementById("currMonth").innerHTML = option1;


    // year
    let option2 = `<option value="YYYY">YYYY</option>`;

    let d = new Date();
    for(let i = d.getFullYear(); i >= 1950; i--)
    {
      option2 += `<option value="${i}">${i}</option>`;
    }

    document.getElementById("currYear").innerHTML = option2;

  </script>
</body>
</html>
