<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>array</title>
</head>
<body>
  
  <script>
    // create array
    let uInfo = [101, "Anurag", "male", "+91-6453468355"];
    let arr = [1,2,3,5,6,7,8,9,10];

    console.log(uInfo);

    // push() method - it add element at last of the array
    uInfo.push(4861115);
    uInfo.push("indore", "Bholaram");
    console.log(uInfo);

    // pop() method  - it remove element from the end of the array
    uInfo.pop();
    console.log(uInfo);
    // for(let i = uInfo.length; i > 0; i++)
    // {
    //   uInfo.pop();  // it remove all element of the array
    // }
    // console.log(uInfo);

    // shift() - it remove element at the begening of the array
    uInfo.shift();
    console.log(uInfo);
    
    // unshift() method - it add element from the frist the array
    uInfo.unshift("hello", "shubham");
    console.log(uInfo);

    // forEach() 
    uInfo.forEach( (num)=>{
      // console.log(num);
      console.log(num);
    })
   
    // map()
    let newarr = uInfo.map( (num)=>{
      return num + "_1";
    });
    console.log(newarr);

    // map()
    let newarr1 = arr.map( (e)=>{ return e*11 });
    console.log(newarr1);

    // filter()
    let even = arr.filter( (f)=>{
      return f % 2 === 0; // for odd number - return f % 2 !== 0
    });
    console.log(even);
    
    // reduce
    let ar = [1,2,3,4,5];
    
    let red = ar.reduce( (result, num)=>{return (result + num)}, 20);
    console.log(red);

</script>
</body>
</html>
