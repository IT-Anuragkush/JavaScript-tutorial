<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AJAX Products</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f1f3f6;
        padding: 20px;
      }

      button {
        display: block;
        margin: 20px auto;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        background: #2874f0;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1f5fc4;
      }

      #result {
        max-width: 1400px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #ddd;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .card img {
        width: 100%;
        height: 220px;
        object-fit: contain;
        padding: 10px;
        background: white;
      }

      .details {
        padding: 15px;
      }

      .title {
        font-size: 16px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }

      .price {
        font-size: 22px;
        color: #111;
        font-weight: bold;
        margin-bottom: 8px;
      }

      .rating {
        display: inline-block;
        background: green;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .brand {
        color: #666;
        margin-top: 8px;
      }

      .stock {
        color: #2563eb;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <button onclick="loadData()">Get Products</button>

    <div id="result"></div>

    <script>
      function loadData() {
        let xhr = new XMLHttpRequest();

        xhr.open("GET", "https://dummyjson.com/products?limit=194", true);

        xhr.onload = function () {
          if (xhr.status === 200) {
            let data = JSON.parse(xhr.responseText);

            console.log(data.products.length);

            let output = "";

            for (let i = 0; i < data.products.length; i++) {
              let product = data.products[i];

              output += `
                <div class="card">
                    <img src="${product.thumbnail}">                   
                    <div class="details">
                        <h3>id : ${product.id}</h3>
                        <h3>title : ${product.title}</h3>                        
                        <h3>category : ${product.category}</h3>
                        <h2>price : ₹${product.price}</h2>
                        <h3>discountPercentage : ${product.discountPercentage}</h3>
                        <h2>rating : ₹${product.rating}</h2>
                        <h2>stock : ₹${product.stock}</h2>
                        <p>brand : ${product.brand}</p>                       
                        <p>weight : ${product.weight}</p>                        
                    </div>
                </div>
                `;
            }

            document.getElementById("result").innerHTML = output;
          }
        };

        xhr.send();
      }
    </script>
  </body>
</html>
